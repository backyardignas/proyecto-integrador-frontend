<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Loguin-Profesores.css">
</head>
<body>
    

    <div class="loguin">
        <div class="icon-header">🛜</div>
        <form id="form-login-profe">
            <h1>Panel Docente</h1>
            
            <div class="usuario">
                <label for="user-profe">Usuario</label>
                <input type="text" placeholder="Ingrese su nombre" id="user-profe" required>
            </div>

            <div class="contraseña">
                <label for="pass-profe">Contraseña</label>
                <input type="password" placeholder="••••••••" id="pass-profe" required>
            </div>

            <div class="button">
                <button type="submit" >Ingresar al Sistema</button>
            </div>
            
            <a href="Main.html" class="back-link"> Regresar al Inicio</a>
        </form>
    </div>

<script src="Loguin-profesores.js"></script>  
</body>
 </html>
