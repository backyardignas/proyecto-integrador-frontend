<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U de O - Login Docentes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/loginProfesores.css">
</head>
<body class="login-body">

    <main class="login-wrapper">
        <div class="login-card shadow-lg">
            <div class="login-logo-container">
                <img src="img/Logo.png" alt="Logo UDEO" class="login-logo" onerror="this.src='https://via.placeholder.com/80?text=UDEO'">
            </div>

            <div class="text-center mb-4">
                <h2 class="fw-bold text-azul">Panel Docente</h2>
                <p class="text-muted small">Gestión Académica de Oriente</p>
            </div>

            <form id="form-login-profe">
                <div class="mb-3">
                    <label for="user-profe" class="form-label fw-semibold">Usuario</label>
                    <input type="text" class="form-control input-custom" id="user-profe" placeholder="Ingrese su usuario" required>
                </div>

                <div class="mb-4">
                    <label for="pass-profe" class="form-label fw-semibold">Contraseña</label>
                    <input type="password" class="form-control input-custom" id="pass-profe" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-login w-100 fw-bold">INGRESAR</button>
            </form>

            <div class="text-center mt-4">
                <a href="Main.html" class="back-link">← Volver al inicio</a>
            </div>
        </div>
    </main>

    <script src="JS/loginProfesores.js"></script>
</body>
</html>
