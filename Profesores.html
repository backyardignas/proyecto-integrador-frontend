<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Profesores.css">
</head>
<body>
    <div class="Navegador">
       <nav class="navbar navbar-expand-lg navegador-custom container">
            <div class="container-fluid">
               
                <a class="navbar-brand" href="index.html">
                    <img src="img/Logo.png" alt="Logo UDEO" class="logo-nav" onerror="this.src='https://via.placeholder.com/150x50?text=UDEO+LOGO'">
                </a>

                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                
                <div class="collapse navbar-collapse" id="menuPrincipal">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="Main.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Facultades</a>
                        </li>
                        <!-- Menú Desplegable -->
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                Iniciar Sesión
                            </a>
                            <ul class="dropdown-menu border-0 shadow">
                                <li><a class="dropdown-item" href="#">Estudiantes</a></li>
                                <li><a class="dropdown-item" href="Loguin-Profesores.html">Docentes</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="#">Directivos</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Contacto</a>
                        </li>
                    </ul>

                    
                    <form class="d-flex" role="search">
                        <input class="form-control me-2 buscador-custom" type="search" placeholder="¿Qué buscas?" aria-label="Buscar">
                        <button class="btn btn-buscar" type="submit">Buscar</button>
                    </form>
                </div>
            </div>
        </nav> 
    </div>



<div class="container mt-4">
    <h2 id="texto-bienvenida" class="mb-4 text-primary"></h2>
    
    <div class="row">
        <section class="col-md-4 mb-4">
            <div class="card shadow-sm p-3">
                <h3>Nueva Asignación</h3>
                <div class="mb-3">
                    <label class="form-label">Nombre del Profesor</label>
                    <input type="text" id="nombre" class="form-control" placeholder="Nombre completo">
                </div>
                <div class="mb-3">
                    <label class="form-label">Materia</label>
                    <input type="text" id="materia" class="form-control" placeholder="Nombre de la asignatura">
                </div>
                <div class="mb-3">
                    <label class="form-label">Horario</label>
                    <input type="text" id="horario" class="form-control" placeholder="Ej: Lun y Mie 6pm">
                </div>
                <button class="btn btn-primary w-100" onclick="agregar()">Guardar Datos</button>
            </div>
        </section>

        <section class="col-md-8">
            <div class="card shadow-sm p-3">
                <h3>Clases Programadas</h3>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Docente</th>
                                <th>Asignatura</th>
                                <th>Horario</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="lista"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="Profesores.js"></script>
</body>
</html>
