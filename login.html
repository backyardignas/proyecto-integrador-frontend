<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universidad de Oriente - Login</title>
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>
    
<div class="login-container">
    <form class="login-box">
        <div class="logo-circular">
            <img src="IMG/Logo.png" alt="Logo Universidad">
        </div>

        <h1 class="logo-text">Uni<span>Oriente</span></h1>
        <h2>Portal Académico</h2>
        
        <div class="input-group">
            <label for="usuario">Usuario</label>
            <input type="text" placeholder="Ingresa tu usuario" id="usuario" required>
        </div>

        <div class="input-group">
            <label for="contraseña">Contraseña</label>
            <input type="password" placeholder="Ingresa tu contraseña" id="contraseña" required>
        </div>

        <button type="button" class="btn-login" onclick="login()">Iniciar Sesión</button>
        
        <div class="footer-links">
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
    </form>
</div>
    
    <script src="JS/login.js"></script>
</body>
</html>
